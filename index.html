<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuntia — Modern Chat</title>
    <link rel="icon" type="image/jpeg" href="nuntia.jpeg">
    <link rel="apple-touch-icon" href="nuntia.jpeg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="splashScreen" class="splash-screen">
        <div class="splash-content">
            <img src="nuntia.jpeg" alt="Nuntia" class="splash-icon" width="120" height="120">
            <h1 class="splash-title">Nuntia</h1>
            <p class="splash-version">v0.1.0</p>
        </div>
    </div>

    <div id="app">
        <!-- Desktop Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>Nuntia</h1>
                <div class="version">v0.1.0</div>
                <button class="conversation-btn profile-under-list" data-view="profile" type="button">👤 Profile</button>
            </div>
            <div class="dm-panel">
                <div class="dm-search">
                    <label for="userSearchInput">Find Username</label>
                    <input id="userSearchInput" class="form-input" type="text" placeholder="Type username...">
                    <div id="userSearchResults" class="user-search-results"></div>
                </div>
                <div id="conversationList" class="conversation-list"></div>
            </div>
            <div class="sidebar-footer">
                <button id="theme-toggle-sidebar" class="sidebar-btn">🌙 Dark Mode</button>
                <button id="logout-sidebar" class="sidebar-btn logout-btn">🚪 Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Auth Screen -->
            <div id="authScreen" class="screen">
                <div class="login-container">
                    <div class="logo-section">
                        <h1 class="app-title">Nuntia</h1>
                        <p class="app-subtitle">connect · share · belong</p>
                    </div>
                    
                    <!-- Login Form -->
                    <div id="loginForm" class="form-card">
                        <div class="form-group">
                            <label>Email or Username</label>
                            <input type="text" id="loginEmail" class="form-input" placeholder="your@email.com or yourname">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <div class="password-group">
                                <input type="password" id="loginPassword" class="form-input" placeholder="••••••">
                                <button type="button" class="toggle-password" data-target="loginPassword">👁️</button>
                            </div>
                        </div>
                        <button id="btn-login" class="btn btn-primary btn-large">Login</button>
                        <div class="auth-link-section">
                            <p>No account? <button id="btn-to-register" class="link-button">Create one</button></p>
                            <p><button id="terms-link-login" class="link-button" type="button">Terms of Service & Privacy Policy</button></p>
                        </div>
                    </div>
                    
                    <!-- Register Form -->
                    <div id="registerForm" class="form-card hidden">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="regUsername" class="form-input" placeholder="coolname">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="regEmail" class="form-input" placeholder="your@email.com">
                        </div>
                        <div class="form-group">
                            <label>Password</label>
                            <div class="password-group">
                                <input type="password" id="regPassword" class="form-input" placeholder="••••••">
                                <button type="button" class="toggle-password" data-target="regPassword">👁️</button>
                            </div>
                        </div>
                        <button id="btn-register" class="btn btn-primary btn-large">Sign Up</button>
                        <div class="auth-link-section">
                            <p>Already have an account? <button id="btn-to-login" class="link-button">Login</button></p>
                            <p><button id="terms-link-register" class="link-button" type="button">Terms of Service & Privacy Policy</button></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chat Screen -->
            <div id="chatScreen" class="screen hidden">
                <div class="header">
                    <div>
                        <h1 id="chatTitle">Nuntia DM</h1>
                        <p id="chatSubtitle" class="chat-subtitle">Select a user to start chatting</p>
                    </div>
                    <div class="header-actions">
                        <button id="theme-toggle-chat" class="header-icon-btn">🌙</button>
                        <button id="btn-logout" class="header-icon-btn danger">🚪</button>
                    </div>
                </div>
                <div class="content" id="chat-content">
                    <div class="messages-container" id="messagesContainer">
                        <div class="empty-state">
                            <div class="empty-state-title">💬 Welcome to Nuntia!</div>
                            <div class="empty-state-text">Send your first message below</div>
                        </div>
                    </div>
                </div>
                <div class="typing-indicator-container" id="typingIndicator"></div>
                <div class="reply-preview" id="replyPreview">
                    <div class="reply-preview-content">
                        <span>Replying to: <span id="replyPreviewText"></span></span>
                        <button id="cancelReply" class="btn-link">Cancel</button>
                    </div>
                </div>
                <div class="input-area">
                    <input type="text" id="messageInput" class="form-input" placeholder="Type a message...">
                    <button id="sendBtn" class="btn-primary">Send</button>
                </div>
            </div>

            <!-- Profile Screen -->
            <div id="profileScreen" class="screen hidden">
                <div class="header">
                    <h1 id="profileHeaderName">Profile</h1>
                    <button id="btn-profile-settings" class="header-icon-btn" title="Profile settings">⚙️</button>
                </div>
                <div class="content">
                    <div class="profile-tabs">
                        <button class="tab-btn active" data-profile-tab="account" type="button">Account</button>
                        <button class="tab-btn" data-profile-tab="preferences" type="button">Preferences</button>
                        <button class="tab-btn" data-profile-tab="activity" type="button">Activity</button>
                        <button class="tab-btn" data-profile-tab="settings" type="button">Settings</button>
                    </div>
                    <div id="profileContent" class="profile-content"></div>
                </div>
            </div>
        </main>

        <!-- Mobile Bottom Nav -->
        <nav class="bottom-nav mobile-only" id="bottomNav">
            <button class="nav-btn active" data-view="chats">💬</button>
            <button class="nav-btn" data-view="profile">👤</button>
        </nav>
    </div>

    <!-- Reaction Picker Modal -->
    <div id="reactionModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Add Reaction</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="reaction-picker">
                    <button class="reaction-option" data-reaction="👍">👍 Like</button>
                    <button class="reaction-option" data-reaction="❤️">❤️ Love</button>
                    <button class="reaction-option" data-reaction="😂">😂 HaHa</button>
                    <button class="reaction-option" data-reaction="😮">😮 Wow</button>
                    <button class="reaction-option" data-reaction="😢">😢 Sad</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Message Modal -->
    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Edit Message</h2>
                <button class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <textarea id="editMessageText" class="form-textarea" rows="3" placeholder="Edit your message" title="Edit message"></textarea>
            </div>
            <div class="modal-footer">
                <button id="saveEditBtn" class="btn btn-primary">Save</button>
                <button id="cancelEditBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <div id="termsModal" class="modal hidden">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>Terms of Service & Privacy Policy</h2>
                <button class="close-btn" id="btn-close-terms" type="button">&times;</button>
            </div>
            <div class="modal-body scrollable" id="termsContent"></div>
            <div class="modal-footer">
                <button id="btn-agree-terms" class="btn btn-primary" type="button">I Understand and Agree</button>
            </div>
        </div>
    </div>

    <!-- Alert Container -->
    <div id="alertContainer" class="alert-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
